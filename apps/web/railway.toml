[build]
builder = "NIXPACKS"
installCommand = "apt-get update && apt-get install -y wget gnupg ca-certificates && wget -q -O - https://dl.google.com/linux_signing_key.pub | apt-key add - && echo 'deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main' >> /etc/apt/sources.list.d/google.list && apt-get update && apt-get install -y google-chrome-stable && npm install --legacy-peer-deps"

[deploy]
startCommand = "node index.js"
restartPolicyType = "ON_FAILURE"
